<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Henet Wave API Demo</title>
  <style>
    body{font-family:system-ui,sans-serif;max-width:900px;margin:40px auto;padding:0 20px;line-height:1.5}
    textarea{width:100%;height:280px;font-family:ui-monospace,monospace}
    button{padding:10px 14px}
    pre{background:#111;color:#eee;padding:14px;overflow:auto;white-space:pre-wrap}
  </style>
</head>
<body>
  <h1>Henet Wave API Demo</h1>
  <p>This is a minimal demo client. Your production website should call the backend API from your own frontend.</p>
  <button id="run">POST /api/v1/calculate</button>
  <textarea id="payload">{
  "swells": [
    {
      "id": 1,
      "enabled": true,
      "swell_type": "trade",
      "wind_mph": 25,
      "wind_dir_from_deg": 70,
      "src_lat": 15.0,
      "src_lon": -52.0,
      "tgt_lat": 13.1,
      "tgt_lon": -59.6,
      "fetch_km": 600,
      "duration_hr": 24,
      "generation_midpoint_utc": "2026-04-07T12:00:00Z"
    }
  ]
}</textarea>
  <pre id="out"></pre>
  <script>
    document.getElementById('run').addEventListener('click', async () => {
      const payload = JSON.parse(document.getElementById('payload').value);
      const res = await fetch('/api/v1/calculate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      document.getElementById('out').textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
